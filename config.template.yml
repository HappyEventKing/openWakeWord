# TTS 参数组合
tts_params:
  aliyun:
    speech_rates: [-200, -100, 0, 100, 200]
    pitch_rates: [-200, 0, 200]
  kokoro:
    speeds: [0.75, 0.9, 1.0, 1.1, 1.25]
  edge:
    rates: ["-20%", "-10%", "+0%", "+10%", "+20%"]
    pitches: ["-10Hz", "+0Hz", "+10Hz"]

# 并发控制
aliyun_concurrency: 5
kokoro_concurrency: 1
edge_concurrency: 20
