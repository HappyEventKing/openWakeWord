model_name: "your_wake_word"

target_phrase:
  - "your wake word"

custom_negative_phrases: []

n_samples: 13480
n_samples_val: 3370

tts_batch_size: 50
augmentation_batch_size: 16

# 兼容 train.py 的 piper_sample_generator_path（指向根目录 wrapper）
piper_sample_generator_path: "."

output_dir: "./output"

rir_paths:
  - "./downloads/mit_rirs/Audio"

background_paths:
  - "./downloads/musan/music"
  - "./downloads/musan/noise"
  - "./downloads/musan/speech"

background_paths_duplication_rate:
  - 1
  - 1
  - 1

false_positive_validation_data_path: "./downloads/validation_set_features.npy"

augmentation_rounds: 3

feature_data_files:
  "ACAV100M_sample": "./downloads/openwakeword_features_ACAV100M_2000_hrs_16bit.npy"

batch_n_per_class:
  "ACAV100M_sample": 1024
  "adversarial_negative": 50
  "positive": 50

model_type: "dnn"
layer_size: 32

steps: 50000

max_negative_weight: 1500
target_false_positives_per_hour: 0.5

# ========== TTS 平台配置 ==========

# 自动下载训练数据（RIR、background、validation）
auto_download_data: true

# TTS 平台选择：aliyun, kokoro, edge
tts_providers:
  - aliyun
  - kokoro
  - edge

# 阿里云模型列表（通过 python list_voices.py --provider aliyun 查看后配置）
